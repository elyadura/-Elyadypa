<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elyadypa | Official Premium Escrow Service</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =================================================
           PREMIUM UI CONFIGURATION - v3.0 - ELYADYPA ULTIMATE
           =================================================
           Более 800 строк чистого visual-жира.
        */
        :root {
            /* Ультра-черная палитра */
            --bg-black: #010204;
            --bg-deep: #060a12;
            --accent-primary: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.6);
            --accent-dark: #0056b3;
            --success: #32d74b;
            --text-ultra: #ffffff;
            --text-secondary: #a1a1a6;
            --text-dim: #475569;
            /* Стеклянные эффекты */
            --glass-bg: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.08);
            /* Анимации */
            --standard-curve: cubic-bezier(0.19, 1, 0.22, 1);
            --slow-curve: cubic-bezier(0.4, 0, 0.2, 1);
            /* Тени и глубина */
            --shadow-heavy: 0 25px 60px rgba(0, 0, 0, 0.8);
        }

        /* Полное обнуление */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; user-select: none; }
        
        /* Кастомный ультимативный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-black); }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 20px; box-shadow: 0 0 10px var(--accent-glow); }

        body {
            background-color: var(--bg-black);
            color: var(--text-ultra);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- КОСМИЧЕСКАЯ ИНСТАЛЛЯЦИЯ (ФОН) --- 
        */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Поднимаем фон чуть выше для видимости */
            background: radial-gradient(circle at 50% 0%, #0d1b30 0%, #010204 100%);
        }

        /* Виньетка для глубины */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* LAYOUT CONTAINER 
        */
        .main-container {
            width: 100%;
            max-width: 440px;
            padding: 40px 20px 100px;
            position: relative;
            z-index: 10; /* Весь контент поверх фона */
            display: flex;
            flex-direction: column;
        }

        /* АНИМАЦИИ И ПОЯВЛЕНИЕ 
        */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.96);
            transition: opacity 1s var(--standard-curve), transform 1s var(--standard-curve);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseOnline {
            0% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(50, 215, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0); }
        }

        /* --- [2] ЯЗЫКОВОЙ ПЕРЕКЛЮЧАТЕЛЬ (КРАСНЫЙ) --- 
        */
        .lang-switcher-card {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
        }

        .lang-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 5px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .lang-btn.active {
            color: white;
            background: rgba(0, 122, 255, 0.15);
            border: 1px solid rgba(0, 122, 255, 0.3);
            text-shadow: 0 0 5px var(--accent-glow);
        }

        /* ШАПКА ПРОФИЛЯ 
        */
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
        }

        .avatar-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 25px;
            padding: 10px;
        }

        .avatar-main {
            width: 100%;
            height: 100%;
            border-radius: 42px;
            object-fit: cover;
            display: block;
            background: #111;
            border: 2px solid var(--glass-border);
            box-shadow: var(--shadow-heavy);
        }

        /* Внешнее кольцо */
        .avatar-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid transparent;
            border-top-color: var(--accent-primary);
            border-radius: 46%;
            animation: rotateRing 4s linear infinite;
        }

        .online-dot {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 22px;
            height: 22px;
            background: var(--success);
            border: 4px solid var(--bg-black);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px var(--success);
            animation: pulseOnline 2s infinite;
        }

        .name-container h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 34px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 50%, #555555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* --- [1] ЗЕЛЕНЫЕ ПЛАШКИ НАПРАВЛЕНИЙ (ЗЕЛЕНЫЙ) --- 
        */
        .status-badge-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            background: rgba(0, 122, 255, 0.1);
            padding: 7px 18px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(0, 122, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .premium-status-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 122, 255, 0.4);
            border-radius: 26px;
            padding: 22px;
            margin-bottom: 15px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.15);
        }

        .status-title {
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .status-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* СТАТИСТИКА 
        */
        .stats-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: var(--standard-curve) 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.06);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-ultra);
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* --- [5] ЧТО ТАКОЕ ГАРАНТ (ПЛАШКА С ОБЪЯСНЕНИЕМ) --- 
        */
        .info-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
        }

        .info-header {
            font-size: 16px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-icon {
            color: var(--accent-primary);
            font-size: 18px;
        }

        .info-body {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* --- [3] НАВИГАЦИЯ (БЕЛЫЙ) --- 
        */
        .section-label {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 15px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        .navigation-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .nav-link-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 22px;
            border-radius: 26px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            position: relative;
        }

        /* Эффект блика */
        .nav-link-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transition: 0.5s;
        }

        .nav-link-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-primary);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .nav-link-item:hover::before { left: 100%; }

        .nav-icon {
            font-size: 22px;
            color: var(--accent-primary);
            margin-right: 20px;
            width: 30px;
            text-align: center;
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }

        .nav-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            flex: 1;
        }

        .nav-arrow {
            color: var(--text-dim);
            font-size: 14px;
        }

        /* КАК ПРОХОДЯТ СДЕЛКИ 
        */
        .workflow-card {
            background: #000;
            border-radius: 32px;
            padding: 30px 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .step-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .step-item:last-child { margin-bottom: 0; }

        /* Соединительная линия */
        .step-item::after {
            content: '';
            position: absolute;
            left: 17px;
            top: 45px;
            width: 1px;
            height: calc(100% - 20px);
            background: rgba(255,255,255,0.05);
        }
        .step-item:last-child::after { display: none; }

        .step-number {
            width: 36px;
            height: 36px;
            background: var(--accent-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 5px 15px var(--accent-glow);
            position: relative;
            z-index: 2;
        }

        .step-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* --- [4] КРИПТОКОШЕЛЕК (ФИОЛЕТОВЫЙ) --- 
        */
        .requisites-section {
            margin-top: 50px;
            margin-bottom: 40px;
        }

        .wallet-card {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            text-align: left;
            position: relative;
            box-shadow: var(--shadow-heavy);
        }

        .wallet-label {
            font-size: 10px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
        }

        .address-box {
            background: rgba(255,255,255,0.03);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .address-box:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .address-box:active { transform: scale(0.97); }

        .address-val {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 11.5px;
            color: rgba(255,255,255,0.8);
            word-break: break-all;
            line-height: 1.5;
            padding-right: 30px;
        }

        .copy-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-primary);
            font-size: 16px;
            opacity: 0.7;
        }

        /* MAIN CTA 
        */
        .ultimate-btn {
            background: var(--accent-primary);
            padding: 25px;
            border-radius: 28px;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 30px;
            transition: all 0.5s var(--standard-curve);
            box-shadow: 0 20px 40px rgba(0, 122, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .ultimate-btn span {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -1px;
            position: relative;
            z-index: 2;
        }

        /* Эффект свечения */
        .ultimate-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            z-index: 1;
        }

        .ultimate-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 25px 50px rgba(0, 122, 255, 0.6);
        }

        .ultimate-btn:active { transform: scale(0.97) translateY(5px); box-shadow: none; }

        /* TOAST NOTIFICATION 
        */
        #luxury-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 10000;
            text-transform: uppercase;
        }

        #luxury-toast.visible { bottom: 50px; }

        /* FOOTER 
        */
        .final-footer {
            margin-top: 100px;
            margin-bottom: 40px;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            color: #222222;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

        <div class="premium-status-card reveal">
