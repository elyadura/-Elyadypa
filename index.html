<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyadypa | Official</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color-solid: #030406;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-restored-bg: #1a1c24;
            --accent-blue: #007aff;
            --text-main: #ffffff;
            --text-dim: #888da0;
            --border-radius-main: 24px;
            --glow-shadow: 0 10px 30px rgba(0, 122, 255, 0.15);
        }

        body {
            background-color: var(--bg-color-solid);
            background-image: linear-gradient(230deg, #030406 30%, #0c1a2e 50%, #030406 70%);
            background-size: 200% 200%;
            animation: gradient-bg 10s ease infinite;
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .container { max-width: 400px; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .lang-switcher-wrapper { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .lang-switcher { display: flex; background: rgba(255, 255, 255, 0.08); padding: 4px; border-radius: 12px; }
        .lang-btn { background: none; border: none; color: var(--text-dim); font-weight: 600; cursor: pointer; padding: 6px 12px; border-radius: 10px; font-size: 12px; transition: 0.3s; }
        .lang-btn.active { color: white; background: rgba(255, 255, 255, 0.1); }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; text-align: center; }
        .avatar-image { width: 95px; height: 95px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 35px rgba(0, 122, 255, 0.2); object-fit: cover; }
        .guarantor-name { font-weight: 800; font-style: italic; font-size: 32px; margin-top: 15px; margin-bottom: 5px; color: var(--text-main); }
        .guarantor-title { color: var(--accent-blue); font-size: 18px; font-weight: 600; margin-bottom: 15px; letter-spacing: 1px; }

        .new-guarantor-card { background-color: var(--card-restored-bg); border-radius: 20px; padding: 20px; width: 100%; box-sizing: border-box; margin-bottom: 25px; box-shadow: var(--glow-shadow); }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .icon-lightning { color: #ffae00; font-size: 22px; }
        .card-title { font-weight: 800; font-style: italic; font-size: 20px; color: var(--text-main); margin: 0; }
        .commission-badge { background-color: rgba(0, 122, 255, 0.1); color: var(--accent-blue); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 5px 12px; border-radius: 8px; display: inline-block; }

        .info-card { background: var(--card-bg); border-radius: var(--border-radius-main); padding: 20px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        
        .stats-row { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; }
        .stat-item { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 15px; flex: 1; min-width: 40%; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-value { color: var(--accent-blue); font-weight: 800; font-size: 18px; display: block; }
        .stat-label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; margin-top: 5px; display: block; }

        .link-card { background: var(--card-bg); border-radius: 18px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; text-decoration: none; color: white; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .link-card:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .link-icon { color: var(--accent-blue); font-size: 18px; margin-right: 15px; }
        .link-info { flex-grow: 1; }
        .link-title { font-weight: 700; font-style: italic; font-size: 15px; }
        .link-subtitle { color: var(--text-dim); font-size: 12px; }

        .section-title { text-align: left; width: 100%; font-weight: 800; font-style: italic; margin: 25px 0 15px; font-size: 17px; padding-left: 5px; color: var(--text-dim); }

        .step { background: var(--card-bg); border-radius: 16px; padding: 12px 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; font-size: 13px; color: var(--text-dim); width: 100%; box-sizing: border-box; }
        .step-num { color: var(--accent-blue); font-weight: 800; }
        .step i { width: 20px; text-align: center; color: var(--accent-blue); }

        .wallet-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-top: 20px; width: 100%; box-sizing: border-box; border: 1px dashed rgba(255,255,255,0.1); }
        .wallet-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: 14px; }
        .wallet-address { font-family: monospace; font-size: 11px; color: var(--text-dim); word-break: break-all; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; }
        .copy-btn { color: var(--accent-blue); font-weight: 700; font-size: 12px; cursor: pointer; }

        .main-btn { background: var(--accent-blue); color: white; text-align: center; padding: 18px; border-radius: 20px; text-decoration: none; font-weight: 800; font-style: italic; font-size: 17px; display: block; margin-top: 25px; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,122,255,0.4); }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #ffffff; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 700; font-size: 14px; transition: 0.5s; z-index: 1000; }
        #toast.show { bottom: 40px; }
        .footer { text-align: center; color: #333; font-size: 9px; letter-spacing: 2px; margin-top: 40px; text-transform: uppercase; }
    </style>
</head>
